name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing version: $VERSION"

      - name: Sync version to SKILL.md and marketplace.json
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          # Update SKILL.md frontmatter versions
          for f in skills/unity-vrc-udon-sharp/SKILL.md skills/unity-vrc-world-sdk-3/SKILL.md .claude/skills/unity-vrc-skills-renovator/SKILL.md; do
            sed -i "s/version: \"[0-9]*\.[0-9]*\.[0-9]*\"/version: \"$VERSION\"/" "$f"
          done
          # Update marketplace.json
          node -e "
            const fs = require('fs');
            const p = '.claude-plugin/marketplace.json';
            const d = JSON.parse(fs.readFileSync(p, 'utf8'));
            d.metadata.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(d, null, 2) + '\n');
          "

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
