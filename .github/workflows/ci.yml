name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  symlinks:
    name: Symlink Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Reject symlinks
        run: |
          SYMLINKS=$(find . -type l -not -path './.git/*')
          if [ -n "$SYMLINKS" ]; then
            echo "ERROR: Symlinks found (breaks npm pack):"
            echo "$SYMLINKS"
            exit 1
          fi
          echo "OK: No symlinks found"

  hooks:
    name: Hook Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check execute permission
        run: |
          HOOK="skills/unity-vrc-udon-sharp/hooks/validate-udonsharp.sh"
          if [ ! -x "$HOOK" ]; then
            echo "ERROR: $HOOK is not executable"
            exit 1
          fi
          echo "OK: $HOOK is executable"

      - name: Bash syntax check
        run: bash -n skills/unity-vrc-udon-sharp/hooks/validate-udonsharp.sh

  markdown:
    name: Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          args: >-
            --exclude "^https://creators\.vrchat\.com"
            --exclude "^https://udonsharp\.docs\.vrchat\.com"
            --exclude "^https://ask\.vrchat\.com"
            --exclude "^https://feedback\.vrchat\.com"
            --exclude "^https://wiki\.vrchat\.com"
            --exclude "^https://github\.com/niaka3dayo/agent-skills-vrc-udon/releases/tag/"
            --timeout 30
            --no-progress
            "**/*.md"
          fail: true

  npm-pack:
    name: npm Pack Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"

      - name: Test npm pack
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          echo ""
          echo "--- Verifying required files ---"
          for f in "bin/install.mjs" "skills/" "templates/" "LICENSE" "README.md"; do
            if grep -q "$f" pack-output.txt; then
              echo "OK: $f"
            else
              echo "ERROR: $f not found in package"
              exit 1
            fi
          done

      - name: Test installer help
        run: node bin/install.mjs --help

      - name: Test installer version
        run: |
          VERSION=$(node bin/install.mjs --version)
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Version mismatch: $VERSION != $PKG_VERSION"
            exit 1
          fi
          echo "OK: Version $VERSION"

      - name: Test installer list
        run: node bin/install.mjs --list

  version-sync:
    name: Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $PKG_VERSION"
          ERRORS=0

          for SKILL_FILE in skills/unity-vrc-udon-sharp/SKILL.md skills/unity-vrc-world-sdk-3/SKILL.md .claude/skills/unity-vrc-skills-renovator/SKILL.md; do
            SKILL_VER=$(grep -oP 'version:\s*"?\K[0-9]+\.[0-9]+\.[0-9]+' "$SKILL_FILE" | head -1)
            if [ "$SKILL_VER" != "$PKG_VERSION" ]; then
              echo "ERROR: $SKILL_FILE has version $SKILL_VER, expected $PKG_VERSION"
              ERRORS=$((ERRORS + 1))
            fi
          done

          MKT_VER=$(node -p "require('./.claude-plugin/marketplace.json').version || 'missing'" 2>/dev/null)
          if [ "$MKT_VER" != "$PKG_VERSION" ]; then
            echo "ERROR: .claude-plugin/marketplace.json has version $MKT_VER, expected $PKG_VERSION"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAIL: $ERRORS version mismatch(es) found"
            exit 1
          fi
          echo "PASS: All versions match $PKG_VERSION"
